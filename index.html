<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบแจ้งเตือนภัยพิบัติ</title>
<style>
  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --border: #E2E0D8;
    --text: #1A1A18;
    --muted: #6B6960;
    --accent: #1E4D8C;

    --red-bg: #FEF0EF; --red-border: #D94F3D; --red-text: #7A1F14; --red-pill: #D94F3D;
    --orange-bg: #FEF4E6; --orange-border: #D4890A; --orange-text: #7A4A05; --orange-pill: #D4890A;
    --yellow-bg: #FFFBEA; --yellow-border: #C8A80C; --yellow-text: #6B5500; --yellow-pill: #C8A80C;
    --blue-bg: #EEF4FD; --blue-border: #2B6CB0; --blue-text: #1A3F6F; --blue-pill: #2B6CB0;
    --green-bg: #EEF8F0; --green-border: #2E7D47; --green-text: #174D28; --green-pill: #2E7D47;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--accent);
    color: #fff;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.18);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 22px; height: 22px; fill: #fff; }
  .header-title { font-size: 18px; font-weight: 600; line-height: 1.3; }
  .header-sub { font-size: 13px; opacity: .7; margin-top: 2px; }

  /* Main layout */
  .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 48px; }

  /* Hazard grid */
  .section-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .hazard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }

  .hazard-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 10px;
    cursor: pointer;
    text-align: center;
    transition: border-color .15s, box-shadow .15s, background .15s;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .hazard-btn:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(30,77,140,.08); }
  .hazard-btn.active {
    border-color: var(--accent);
    background: #EEF4FD;
    box-shadow: 0 0 0 3px rgba(30,77,140,.12);
  }
  .hazard-btn svg { width: 26px; height: 26px; stroke: var(--muted); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; transition: stroke .15s; }
  .hazard-btn.active svg, .hazard-btn:hover svg { stroke: var(--accent); }
  .hazard-btn span { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .hazard-btn.active span { color: var(--accent); font-weight: 600; }

  /* Level pills */
  .level-row {
    display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .level-pill {
    flex: 1; min-width: 80px;
    padding: 10px 8px;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .15s;
    white-space: nowrap;
  }
  .level-pill .dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  }
  .level-pill:hover { border-color: #999; }

  .level-pill[data-level="red"].active    { background: var(--red-pill); border-color: var(--red-pill); color: #fff; }
  .level-pill[data-level="red"].active .dot { background: rgba(255,255,255,.6); }
  .level-pill[data-level="orange"].active { background: var(--orange-pill); border-color: var(--orange-pill); color: #fff; }
  .level-pill[data-level="orange"].active .dot { background: rgba(255,255,255,.6); }
  .level-pill[data-level="yellow"].active { background: var(--yellow-pill); border-color: var(--yellow-pill); color: var(--yellow-text); }
  .level-pill[data-level="yellow"].active .dot { background: rgba(0,0,0,.2); }
  .level-pill[data-level="blue"].active   { background: var(--blue-pill); border-color: var(--blue-pill); color: #fff; }
  .level-pill[data-level="blue"].active .dot { background: rgba(255,255,255,.6); }
  .level-pill[data-level="green"].active  { background: var(--green-pill); border-color: var(--green-pill); color: #fff; }
  .level-pill[data-level="green"].active .dot { background: rgba(255,255,255,.6); }

  .dot-red    { background: var(--red-pill); }
  .dot-orange { background: var(--orange-pill); }
  .dot-yellow { background: var(--yellow-pill); }
  .dot-blue   { background: var(--blue-pill); }
  .dot-green  { background: var(--green-pill); }

  /* Result card */
  .result-placeholder {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .result-placeholder svg { width: 36px; height: 36px; stroke: var(--border); fill: none; stroke-width: 1.4; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }

  .alert-card {
    border-radius: 16px;
    border: 2px solid;
    overflow: hidden;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .alert-card.red    { background: var(--red-bg);    border-color: var(--red-border); }
  .alert-card.orange { background: var(--orange-bg); border-color: var(--orange-border); }
  .alert-card.yellow { background: var(--yellow-bg); border-color: var(--yellow-border); }
  .alert-card.blue   { background: var(--blue-bg);   border-color: var(--blue-border); }
  .alert-card.green  { background: var(--green-bg);  border-color: var(--green-border); }

  .alert-head {
    padding: 16px 20px;
    display: flex; align-items: flex-start; gap: 14px;
    border-bottom: 1px solid rgba(0,0,0,.07);
  }
  .alert-badge {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .alert-badge svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .red    .alert-badge { background: var(--red-border); }
  .orange .alert-badge { background: var(--orange-border); }
  .yellow .alert-badge { background: var(--yellow-border); }
  .blue   .alert-badge { background: var(--blue-border); }
  .green  .alert-badge { background: var(--green-border); }

  .alert-head-text { flex: 1; }
  .alert-hazard { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .red    .alert-hazard { color: var(--red-text); }
  .orange .alert-hazard { color: var(--orange-text); }
  .yellow .alert-hazard { color: var(--yellow-text); }
  .blue   .alert-hazard { color: var(--blue-text); }
  .green  .alert-hazard { color: var(--green-text); }

  .alert-level-tag {
    display: inline-block;
    margin-top: 5px;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 50px;
    color: #fff;
  }
  .red    .alert-level-tag { background: var(--red-border); }
  .orange .alert-level-tag { background: var(--orange-border); }
  .yellow .alert-level-tag { background: var(--yellow-border); color: var(--yellow-text); }
  .blue   .alert-level-tag { background: var(--blue-border); }
  .green  .alert-level-tag { background: var(--green-border); }

  .alert-body { padding: 16px 20px 20px; }
  .items-count { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

  .items { list-style: none; display: flex; flex-direction: column; gap: 0; }
  .items li {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 14px; line-height: 1.65;
    padding: 9px 0;
    border-bottom: 1px solid rgba(0,0,0,.06);
  }
  .items li:last-child { border-bottom: none; }
  .item-num {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; margin-top: 1px;
  }
  .red    .item-num { background: var(--red-border); color: #fff; }
  .orange .item-num { background: var(--orange-border); color: #fff; }
  .yellow .item-num { background: var(--yellow-border); color: var(--yellow-text); }
  .blue   .item-num { background: var(--blue-border); color: #fff; }
  .green  .item-num { background: var(--green-border); color: #fff; }

  .items li p { flex: 1; color: var(--text); }

  /* Emergency strip for red/orange */
  .emergency-strip {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 10px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 600;
  }
  .red .emergency-strip    { background: rgba(217,79,61,.12); color: var(--red-text); }
  .orange .emergency-strip { background: rgba(212,137,10,.12); color: var(--orange-text); }
  .emergency-strip svg { width: 18px; height: 18px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; }

  @media (max-width: 500px) {
    .hazard-grid { grid-template-columns: repeat(3, 1fr); }
    .level-pill { font-size: 12px; padding: 9px 6px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><path d="M12 2L3 19h18L12 2z"/><path d="M12 9v5M12 16.5v.5" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
  </div>
  <div>
    <div class="header-title">ระบบคัดเลือกข้อควรปฏิบัติ</div>
    <div class="header-sub">เลือกประเภทภัยและระดับความรุนแรง</div>
  </div>
</div>

<div class="container">

  <div class="section-label">ประเภทภัย</div>
  <div class="hazard-grid" id="hazardGrid"></div>

  <div class="section-label">ระดับความรุนแรง</div>
  <div class="level-row" id="levelRow">
    <button class="level-pill" data-level="red"    onclick="setLevel('red')">   <span class="dot dot-red"></span>แดง</button>
    <button class="level-pill" data-level="orange" onclick="setLevel('orange')"><span class="dot dot-orange"></span>ส้ม</button>
    <button class="level-pill" data-level="yellow" onclick="setLevel('yellow')"><span class="dot dot-yellow"></span>เหลือง</button>
    <button class="level-pill" data-level="blue"   onclick="setLevel('blue')">  <span class="dot dot-blue"></span>น้ำเงิน</button>
    <button class="level-pill" data-level="green"  onclick="setLevel('green')"  ><span class="dot dot-green"></span>เขียว</button>
  </div>

  <div id="output">
    <div class="result-placeholder">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 15.5v.5"/></svg>
      เลือกประเภทภัยด้านบน<br>แล้วเลือกระดับสีเพื่อดูข้อควรปฏิบัติ
    </div>
  </div>

</div>

<script>

const DATA = {
  earthquake:{
    name:'แผ่นดินไหว',
    red:['ตั้งสติ อย่าตื่นตกใจ มองหาทางออกหรือจุดปลอดภัยใกล้ตัว','ห้ามใช้ลิฟต์เด็ดขาด ควรใช้บันไดแทน เนื่องจากลิฟต์อาจค้างหรือหยุดทำงาน','หากอยู่ในอาคาร ให้หาที่กำบังหรือจุดที่โครงสร้างแข็งแรง อยู่ให้ห่างจากประตู ระเบียง และหน้าต่าง','หากอยู่ชั้นล่างและใกล้ทางออก ให้รีบออกจากอาคารทันที','อยู่ให้ห่างเสาไฟฟ้า ป้ายโฆษณา และอาคาร','หากอยู่ในที่โล่ง ไม่ควรหลบอยู่ใต้ต้นไม้หรือสายไฟระหว่างเกิดแผ่นดินไหว','หากกำลังขับรถให้หยุดรถในบริเวณที่ปลอดภัย','อย่าใช้เทียน ไม้ขีดไฟ หรือสิ่งที่ทำให้เกิดประกายไฟ เพราะอาจมีแก๊สรั่ว','ติดตามข่าวสารจากทางราชการอย่างเคร่งครัด','ห้ามกลับเข้าพื้นที่เสี่ยงจนกว่าจะมีประกาศว่าสถานการณ์ปลอดภัยแล้ว'],
    orange:['ตั้งสติ อย่าตื่นตกใจ มองหาทางออกหรือจุดปลอดภัยใกล้ตัว','ห้ามใช้ลิฟต์เด็ดขาด ควรใช้บันไดแทน','หากอยู่ในอาคาร ให้หาที่กำบังหรือจุดที่โครงสร้างแข็งแรง อยู่ให้ห่างจากประตู ระเบียง และหน้าต่าง','หากอยู่ชั้นล่างและใกล้ทางออก ให้รีบออกจากอาคารทันที','หลีกเลี่ยงเสาไฟฟ้า ป้ายโฆษณา และอาคาร','ถ้ากำลังขับรถ ให้หยุดในบริเวณปลอดภัย','ติดตามข่าวสารจากทางราชการอย่างใกล้ชิด'],
    yellow:['ติดตามข้อมูลข่าวสารจากทางราชการอย่างใกล้ชิด','ทบทวนและตรวจสอบจุดปลอดภัยภายในบ้าน โดยเฉพาะของหนักที่อยู่บนที่สูง','วางแผนติดต่อสื่อสารและเตรียมกระเป๋าสาธารณภัยในกรณีฉุกเฉิน','ประสานผู้นำชุมชนหรือผู้นำท้องถิ่นเป็นระยะ'],

  },
  tsunami:{
    name:'สึนามิ',
    red:['อย่าอยู่ใกล้ชายฝั่ง อพยพขึ้นที่สูงหรือเข้าพื้นที่ปลอดภัยภายในอาคารสูงโดยด่วน','หากรู้สึกแผ่นดินไหวรุนแรงหรือเห็นน้ำทะเลลด/ถอยออก ให้รีบหนีขึ้นที่สูงทันที อย่ารอคำเตือน','ติดตามคำสั่งจากหน่วยงานราชการและปฏิบัติตามอย่างเคร่งครัด','ใช้เส้นทางอพยพที่กำหนด หลีกเลี่ยงชายฝั่ง ถนนต่ำ และสะพานที่อาจพัง','พกชุดกระเป๋าฉุกเฉิน (น้ำสะอาด อาหารสำรอง ยา ไฟฉาย แบตเตอรี่ สำเนาเอกสารสำคัญ)','ห้ามกลับเข้าพื้นที่เสี่ยงจนกว่าจะมีประกาศว่าปลอดภัยแล้ว (อาจมีคลื่นซ้ำหลายรอบ)'],

const LEVELS = {
  red:    { label:'แดง',    desc:'วิกฤต — อันตรายถึงชีวิต', emergency: true },
  orange: { label:'ส้ม',    desc:'อันตรายสูง — ต้องระวังเคร่งครัด', emergency: true },
  yellow: { label:'เหลือง', desc:'เฝ้าระวัง — เตรียมพร้อมรับสถานการณ์', emergency: false },
  blue:   { label:'น้ำเงิน',desc:'ติดตาม — ปฏิบัติตามคำแนะนำ', emergency: false },
  green:  { label:'เขียว', desc:'ปกติ — ติดตามข้อมูลเป็นประจำ', emergency: false }
};

let selHazard = '', selLevel = '';

function buildHazardGrid() {
  const grid = document.getElementById('hazardGrid');
  HAZARDS.forEach(h => {
    const btn = document.createElement('button');
    btn.className = 'hazard-btn';
    btn.id = 'h-' + h.id;
    btn.setAttribute('aria-label', h.label);
    btn.innerHTML = `<svg viewBox="0 0 24 24">${h.icon}</svg><span>${h.label}</span>`;
    btn.onclick = () => selectHazard(h.id);
    grid.appendChild(btn);
  });
}

function selectHazard(id) {
  selHazard = id;
  document.querySelectorAll('.hazard-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('h-' + id).classList.add('active');
  render();
}

function setLevel(lv) {
  selLevel = lv;
  document.querySelectorAll('.level-pill').forEach(p => p.classList.remove('active'));
  document.querySelector(`.level-pill[data-level="${lv}"]`).classList.add('active');
  render();
}

function render() {
  const out = document.getElementById('output');
  if (!selHazard || !selLevel) {
    out.innerHTML = `<div class="result-placeholder">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 15.5v.5"/></svg>
      ${!selHazard ? 'กรุณาเลือกประเภทภัยและระดับสีด้านบน' : 'กรุณาเลือกระดับสีด้านบน'}
    </div>`;
    return;
  }
  const h = DATA[selHazard];
  const lv = LEVELS[selLevel];
  const items = h[selLevel] || [];
  const emergency = lv.emergency;

  out.innerHTML = `
    <div class="alert-card ${selLevel}">
      <div class="alert-head">
        <div class="alert-badge">
          <svg viewBox="0 0 24 24">${HAZARDS.find(x=>x.id===selHazard).icon}</svg>
        </div>
        <div class="alert-head-text">
          <div class="alert-hazard">${h.name}</div>
          <span class="alert-level-tag">● ${lv.label} — ${lv.desc}</span>
        </div>
      </div>
      <div class="alert-body">
        <div class="items-count">${items.length} ข้อควรปฏิบัติ</div>
        <ul class="items">
          ${items.map((item, i) => `
            <li>
              <span class="item-num">${i+1}</span>
              <p>${item}</p>
            </li>`).join('')}
        </ul>
        ${emergency ? `
        <div class="emergency-strip">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v2.1a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 1h2.1a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 3a2 2 0 0 1-.5 2.1L7.9 8.2a16 16 0 0 0 6 6l.5-.5a2 2 0 0 1 2-.5c1 .3 2 .5 3 .7a2 2 0 0 1 1.7 2z"/></svg>
          โทรสายด่วนสาธารณภัย 1784 หรือ 1669 หากต้องการความช่วยเหลือ
        </div>` : ''}
      </div>
    </div>`;
}

buildHazardGrid();
</script>
